<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>留言回复通知</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f3f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f4f3f0;">
    <tr>
      <td align="center" style="padding:40px 16px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:520px;border:1px solid #e3e1dc;background-color:#ffffff;">
          <tr>
            <td style="height:3px;background-color:#0d9488;font-size:0;line-height:0;">&nbsp;</td>
          </tr>

          <tr>
            <td style="padding:28px 32px 20px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td>
                    <span style="display:inline-block;padding:4px 10px;border:1px solid #ccebe7;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:10px;letter-spacing:0.14em;color:#0f766e;text-transform:uppercase;">Wall Reply</span>
                  </td>
                  <td align="right" style="vertical-align:top;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#5eead4" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
                    </svg>
                  </td>
                </tr>
              </table>

              <h1 style="margin:16px 0 0;font-size:22px;line-height:1.35;font-weight:600;color:#18181b;letter-spacing:-0.02em;">你的留言被回复了</h1>
              <p style="margin:8px 0 0;font-size:13px;line-height:1.6;color:#71717a;">站长回复了你的留言墙消息，快来看看吧。</p>
            </td>
          </tr>

          <tr>
            <td style="padding:0 32px 20px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="border-top:1px solid #f0efec;border-bottom:1px solid #f0efec;">
                <tr>
                  <td style="padding:14px 0;width:50%;vertical-align:top;">
                    <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td style="padding-right:8px;vertical-align:middle;">
                          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#a1a1aa" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                          </svg>
                        </td>
                        <td style="vertical-align:middle;">
                          <div style="font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:#a1a1aa;">回复者</div>
                          <div style="margin-top:2px;font-size:13px;font-weight:500;color:#3f3f46;"><span th:text="${recipient}">站长</span></div>
                        </td>
                      </tr>
                    </table>
                  </td>
                  <td style="padding:14px 0;width:50%;vertical-align:top;">
                    <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td style="padding-right:8px;vertical-align:middle;">
                          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#a1a1aa" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                          </svg>
                        </td>
                        <td style="vertical-align:middle;">
                          <div style="font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:#a1a1aa;">时间</div>
                          <div style="margin-top:2px;font-size:13px;font-weight:500;color:#3f3f46;"><span th:text="${time}">时间</span></div>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- your message -->
          <tr>
            <td style="padding:0 32px 12px;">
              <div style="padding:16px 18px;border:1px solid #eceae5;border-left:3px solid #d4d4d8;background-color:#faf9f7;">
                <div style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#a1a1aa;margin-bottom:8px;">你的留言</div>
                <div style="font-size:14px;line-height:1.75;color:#52525b;word-break:break-word;" th:utext="${your_content}">留言内容</div>
              </div>
            </td>
          </tr>

          <!-- reply -->
          <tr>
            <td style="padding:0 32px 28px;">
              <div style="padding:16px 18px;border:1px solid #ccebe7;border-left:3px solid #0d9488;background-color:#f0fdfa;">
                <div style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#0f766e;margin-bottom:8px;">站长回复</div>
                <div style="font-size:15px;line-height:1.75;color:#134e4a;word-break:break-word;" th:utext="${reply_content}">回复内容</div>
              </div>
            </td>
          </tr>

          <tr>
            <td style="padding:0 32px 32px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td align="center">
                    <a th:href="${url}" target="_blank" style="display:inline-block;padding:12px 28px;background-color:#0f766e;color:#ffffff;font-size:13px;font-weight:500;text-decoration:none;letter-spacing:0.02em;cursor:pointer;">
                      前往留言墙
                      <span style="display:inline-block;margin-left:6px;vertical-align:middle;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;" aria-hidden="true">
                          <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
                        </svg>
                      </span>
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td style="padding:16px 32px;border-top:1px solid #f0efec;background-color:#faf9f7;">
              <p style="margin:0;font-size:11px;line-height:1.6;color:#a1a1aa;text-align:center;">此邮件由 ThriveX 自动发送，请勿直接回复。</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
